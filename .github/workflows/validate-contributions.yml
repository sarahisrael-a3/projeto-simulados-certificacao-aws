name: Validate Contributions

on:
  pull_request:
    paths:
      - 'data/contributions/**/*.json'
      - '!data/contributions/**/_processed/**'
      - '!data/contributions/_TEMPLATE*.json'
  workflow_dispatch:

jobs:
  validate-questions:
    name: Validate Question Files
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f src/python/scripts/requirements.txt ]; then
            pip install -r src/python/scripts/requirements.txt
          fi
      
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          separator: ","
          files: |
            data/contributions/**/*.json
          files_ignore: |
            data/contributions/**/_processed/**
            data/contributions/_TEMPLATE*.json
      
      - name: List changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "Files detected:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}"
      
      - name: Validate each contribution
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "Starting validation..."
          echo ""
          
          FAILED=0
          PASSED=0
          
          IFS=',' read -ra FILES <<< "${{ steps.changed-files.outputs.all_changed_files }}"
          for file in "${FILES[@]}"; do
            file=$(echo "$file" | xargs)
            [ -z "$file" ] && continue
            
            # Skip if file doesn't exist (deleted files)
            if [ ! -f "$file" ]; then
              echo "Skipping deleted file: $file"
              continue
            fi
            
            echo "Validating: $file"
            
            if python src/python/scripts/validate_contribution.py "$file"; then
              echo "PASSED: $file"
              PASSED=$((PASSED + 1))
            else
              echo "FAILED: $file"
              FAILED=$((FAILED + 1))
            fi
            echo ""
          done
          
          echo "Summary:"
          echo "Passed: $PASSED"
          echo "Failed: $FAILED"
          
          if [ $FAILED -gt 0 ]; then
            echo "Validation failed!"
            exit 1
          else
            echo "All validations passed!"
            exit 0
          fi
      
      - name: Comment on PR Success
        if: success() && steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const files = '${{ steps.changed-files.outputs.all_changed_files }}'.split(',').map(f => f.trim()).filter(Boolean);
            const fileList = files.map(f => `- ${f}`).join('\n');
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Validation Passed!\n\nAll questions validated successfully!\n\n### Files validated:\n${fileList}\n\nThank you for contributing!`
            });
      
      - name: Comment on PR Failure
        if: failure() && steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Validation Failed\n\nSome questions did not pass validation. Please check the logs above and fix the errors.\n\n### How to fix:\n\n1. Check the logs for specific errors\n2. Fix locally using:\n   \`\`\`bash\n   python src/python/scripts/validate_contribution.py your-file.json\n   \`\`\`\n3. Commit and push the fixes`
            });
      
      - name: No contributions detected
        if: steps.changed-files.outputs.any_changed != 'true'
        run: |
          echo "No contribution files detected in this PR."
