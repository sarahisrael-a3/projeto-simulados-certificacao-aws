name: 🔍 Validate Contributions

on:
  pull_request:
    paths:
      - 'data/contributions/**/*.json'
      - '!data/contributions/**/_processed/**'
      - '!data/contributions/_TEMPLATE*.json'
  workflow_dispatch:

jobs:
  validate-questions:
    name: Validate Question Files
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r scripts_python/requirements.txt
      
      - name: 🔍 Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            data/contributions/**/*.json
          files_ignore: |
            data/contributions/**/_processed/**
            data/contributions/_TEMPLATE*.json
      
      - name: 📋 List changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "🔍 Arquivos de contribuição detectados:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}"
      
      - name: ✅ Validate each contribution
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "🚀 Iniciando validação de contribuições..."
          echo ""
          
          FAILED=0
          PASSED=0
          
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📄 Validando: $file"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            if python scripts_python/validate_contribution.py "$file"; then
              echo "✅ PASSOU: $file"
              PASSED=$((PASSED + 1))
            else
              echo "❌ FALHOU: $file"
              FAILED=$((FAILED + 1))
            fi
            echo ""
          done
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 RESUMO DA VALIDAÇÃO"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Questões aprovadas: $PASSED"
          echo "❌ Questões reprovadas: $FAILED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ $FAILED -gt 0 ]; then
            echo ""
            echo "❌ Validação falhou! Corrija os erros acima antes de mergear."
            exit 1
          else
            echo ""
            echo "✅ Todas as questões passaram na validação!"
            exit 0
          fi
      
      - name: 💬 Comment on PR (Success)
        if: success() && steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const files = '${{ steps.changed-files.outputs.all_changed_files }}'.split(' ');
            const fileList = files.map(f => `- ✅ \`${f}\``).join('\n');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ Validação de Contribuições Passou!
              
Todas as questões foram validadas com sucesso! 🎉

### Arquivos validados:
${fileList}

### Próximos passos:
- ✅ Validação automática concluída
- 👀 Aguardando review de um mantenedor
- 🔄 Após aprovação, suas questões serão mergeadas no banco principal

Obrigado por contribuir com a Guilda! 🙏`
            })
      
      - name: 💬 Comment on PR (Failure)
        if: failure() && steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ Validação de Contribuições Falhou

Algumas questões não passaram na validação automática. Por favor, revise os erros acima e corrija antes de prosseguir.

### Como corrigir:

1. **Veja os logs acima** para identificar os erros específicos
2. **Corrija localmente** usando o validador:
   \`\`\`bash
   python scripts_python/validate_contribution.py data/contributions/clf-c02/sua-questao.json
   \`\`\`
3. **Faça commit das correções** e push para atualizar o PR

### Erros comuns:

- ❌ Campos obrigatórios faltando
- ❌ JSON inválido (vírgulas, chaves, aspas)
- ❌ Dificuldade inválida (use: easy, medium, hard)
- ❌ Tipo inválido (use: multiple-choice, multiple-answer)
- ❌ Resposta correta fora do range de opções

### Precisa de ajuda?

Consulte o [Guia de Contribuição](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/docs/guia-contribuicao-questoes.md) ou abra uma discussão!`
            })
      
      - name: 🎉 No contributions detected
        if: steps.changed-files.outputs.any_changed != 'true'
        run: |
          echo "ℹ️  Nenhuma contribuição de questão detectada neste PR."
          echo "   Este workflow só valida arquivos em data/contributions/"
