name: JavaScript Tests

on:
  push:
    branches: ["main"]
    paths:
      - "src/frontend/js/**"
      - "src/services/**"
      - "backend/**"
      - "__tests__/**"
      - "scripts/**"
      - "jest.setup.js"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: ["main"]
    paths:
      - "src/frontend/js/**"
      - "src/services/**"
      - "backend/**"
      - "__tests__/**"
      - "scripts/**"
      - "jest.setup.js"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
