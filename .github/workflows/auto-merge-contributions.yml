name: Auto-Merge Contributions

on:
  workflow_dispatch:
    inputs:
      cert_id:
        description: 'Certification ID'
        required: true
        type: choice
        options:
          - clf-c02
          - saa-c03
          - aif-c01
          - dva-c02
      dry_run:
        description: 'Dry run (test without making changes)'
        required: false
        type: boolean
        default: false

jobs:
  merge-contributions:
    name: Merge Contributions to Main File
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r src/python/scripts/requirements.txt
      
      - name: Run merge script
        id: merge
        run: |
          echo "Starting merge for: ${{ inputs.cert_id }}"
          echo ""
          
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "DRY-RUN mode activated"
            python src/python/scripts/merge_contributions.py ${{ inputs.cert_id }} --dry-run
          else
            python src/python/scripts/merge_contributions.py ${{ inputs.cert_id }}
          fi
          
          if [ -d "data/contributions/${{ inputs.cert_id }}/_processed" ]; then
            MERGED=$(ls data/contributions/${{ inputs.cert_id }}/_processed/*.json 2>/dev/null | wc -l || echo "0")
          else
            MERGED=0
          fi
          
          PENDING=$(find data/contributions/${{ inputs.cert_id }} -maxdepth 1 -name "*.json" ! -name "_TEMPLATE*" 2>/dev/null | wc -l || echo "0")
          TOTAL=$(jq '. | length' data/${{ inputs.cert_id }}.json)
          
          echo "merged=$MERGED" >> $GITHUB_OUTPUT
          echo "pending=$PENDING" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
      
      - name: Display statistics
        run: |
          echo "Merge Statistics:"
          echo "Merged: ${{ steps.merge.outputs.merged }}"
          echo "Pending: ${{ steps.merge.outputs.pending }}"
          echo "Total: ${{ steps.merge.outputs.total }}"
      
      - name: Commit changes
        if: inputs.dry_run == false && steps.merge.outputs.merged != '0'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add data/${{ inputs.cert_id }}.json
          git add data/contributions/${{ inputs.cert_id }}/_processed/
          git add data/backups/
          
          git commit -m "chore(${{ inputs.cert_id }}): merge ${{ steps.merge.outputs.merged }} contributions"
          git push
      
      - name: Create summary
        run: |
          echo "## Merge Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Merged: ${{ steps.merge.outputs.merged }}" >> $GITHUB_STEP_SUMMARY
          echo "- Pending: ${{ steps.merge.outputs.pending }}" >> $GITHUB_STEP_SUMMARY
          echo "- Total: ${{ steps.merge.outputs.total }}" >> $GITHUB_STEP_SUMMARY
