name: 🧪 Test Python Scripts

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'scripts_python/**/*.py'
      - 'scripts_python/requirements.txt'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'scripts_python/**/*.py'
      - 'scripts_python/requirements.txt'
  workflow_dispatch:

jobs:
  test-scripts:
    name: Test Python Scripts
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r scripts_python/requirements.txt
          pip install pytest pytest-cov
      
      - name: 🔍 Lint with flake8 (optional)
        continue-on-error: true
        run: |
          pip install flake8
          flake8 scripts_python/ --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: ✅ Test validator script
        run: |
          echo "🧪 Testando validador com questão de exemplo..."
          python scripts_python/validate_contribution.py \
            data/contributions/clf-c02/exemplo-questao-s3.json
      
      - name: ✅ Test merger script (dry-run)
        run: |
          echo "🧪 Testando merger em modo dry-run..."
          python scripts_python/merge_contributions.py clf-c02 --dry-run
      
      - name: 📊 Display test results
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Todos os testes passaram!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🐍 Python: ${{ matrix.python-version }}"
          echo "✅ Validador: OK"
          echo "✅ Merger: OK"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
