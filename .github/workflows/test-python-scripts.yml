name: Test Python Scripts

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/python/scripts/**/*.py'
      - 'src/python/scripts/requirements.txt'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/python/scripts/**/*.py'
      - 'src/python/scripts/requirements.txt'
  workflow_dispatch:

jobs:
  test-scripts:
    name: Test Python Scripts
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r src/python/scripts/requirements.txt
      
      - name: Test validator script
        run: |
          echo "Testing validator..."
          python src/python/scripts/validate_contribution.py data/contributions/clf-c02/exemplo-questao-s3.json
      
      - name: Test merger script dry-run
        run: |
          echo "Testing merger in dry-run mode..."
          python src/python/scripts/merge_contributions.py clf-c02 --dry-run
      
      - name: Display test results
        run: |
          echo "All tests passed!"
          echo "Python: ${{ matrix.python-version }}"
