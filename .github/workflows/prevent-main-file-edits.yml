name: Prevent Main File Edits

on:
  pull_request:
    paths:
      - 'data/clf-c02.json'
      - 'data/saa-c03.json'
      - 'data/aif-c01.json'
      - 'data/dva-c02.json'
      - 'data/*-en.json'

jobs:
  block-main-files:
    name: Block Direct Edits to Main Files
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check for main file edits
        id: check-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            data/clf-c02.json
            data/saa-c03.json
            data/aif-c01.json
            data/dva-c02.json
            data/*-en.json
      
      - name: Block PR if main files were edited
        if: steps.check-files.outputs.any_changed == 'true'
        run: |
          echo "ERROR: Direct edit of main files detected!"
          echo ""
          echo "Modified files:"
          echo "${{ steps.check-files.outputs.all_changed_files }}"
          echo ""
          echo "Please use the modular contribution system instead."
          echo "See: docs/guia-contribuicao-questoes.md"
          exit 1
      
      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const files = '${{ steps.check-files.outputs.all_changed_files }}'.split(' ').filter(Boolean);
            const fileList = files.map(f => `- ${f}`).join('\n');
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Direct Edit of Main Files Blocked\n\nThis PR attempts to edit main database files directly, which is not allowed to avoid merge conflicts.\n\n### Blocked files:\n${fileList}\n\n### How to contribute correctly:\n\n1. Create an individual file in data/contributions/<cert-id>/\n2. Use the provided templates\n3. Validate with: python src/python/scripts/validate_contribution.py\n\nSee the contribution guide for details.`
            });
