<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simulador AWS - Certificações</title>
    <script>
      // GitHub Pages SPA fallback
      // Redireciona qualquer 404 para index.html preservando o path
      var path = window.location.pathname.replace(
        /\/projeto-simulados-certificacao-aws\//,
        "",
      );
      if (path && !path.includes(".")) {
        window.location =
          "/projeto-simulados-certificacao-aws/?" + encodeURIComponent(path);
      }
    </script>
  </head>
  <body>
    <p>Redirecionando...</p>
  </body>
</html>
